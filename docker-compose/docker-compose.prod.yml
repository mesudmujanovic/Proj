services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../practiseB
      dockerfile: Dockerfile.prod
    image: moj-spring:prod
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_CONTAINER_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    expose:
      - "${BACKEND_CONTAINER_PORT}"

  frontend:
    build:
      context: ../practiseF
      dockerfile: Dockerfile.prod
    image: moj-angular:prod
    networks:
      - app_net
    expose:
      - "${FRONTEND_PROD_CONTAINER_PORT}"

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_CONTAINER_PORT}"
    volumes:
      - "C:/Desktop/nginx/prod.conf:/etc/nginx/conf.d/default.conf"
    depends_on:
      - frontend
      - backend
    networks:
      - app_net

volumes:
  postgres_data_prod:

networks:
  app_net:
    driver: bridge